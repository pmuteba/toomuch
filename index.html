<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SME Attribute Merge Assistant</title>
    
    <!-- Tailwind CSS Engine CDN -->
    <script src="https://tailwindcss.com"></script>
    
    <!-- FIXED: Authoritative Standalone Browser Distribution for SheetJS -->
    <script type="text/javascript" src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <style>
        /* Base Canvas Grid Partitions */
        #app-view {
            display: flex !important;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background-color: #111827; /* Gray-900 */
        }
        
        .main-split-frame {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        #trees-window {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            background-color: #111827;
        }

        /* Enforce Grid Structure for Tree Cards */
        #trees-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        /* Color Coding Mapping Blocks */
        .status-DROP { border-left: 6px solid #EF4444 !important; color: #EF4444 !important; background-color: #1F2937; } 
        .status-NAV { border-left: 6px solid #3B82F6 !important; color: #3B82F6 !important; background-color: #1F2937; }  
        .status-KEEP { border-left: 6px solid #10B981 !important; color: #10B981 !important; background-color: #1F2937; } 
        .status-WIP { border-left: 6px solid #F59E0B !important; color: #F59E0B !important; background-color: #1F2937; }  
        .status-MERGE { border-left: 6px solid #F97316 !important; color: #F97316 !important; background-color: #1F2937; }

        /* Card Elements layout */
        .tree-card {
            background-color: #1F2937; /* Gray-800 */
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid #374151;
            display: flex;
            flex-direction: column;
            min-width: 260px;
        }

        .tree-container { 
            min-height: 150px; 
            background-color: #111827;
            border-radius: 0.375rem;
            padding: 0.5rem;
            margin-top: 0.5rem;
        }

        .tree-node { 
            transition: all 0.2s ease; 
            background-color: #374151;
            padding: 0.5rem;
            border-radius: 0.25rem;
            margin-bottom: 0.5rem;
            cursor: grab;
            border: 1px solid #4B5563;
        }
        
        .tree-node:hover {
            border-color: #F97316;
        }

        /* Panel Sizing Bounds overrides */
        .sidebar-panel {
            width: 320px !important;
            background-color: #1F2937;
            border-left: 1px solid #374151;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        
        .sidebar-hidden {
            width: 0px !important;
            transform: translateX(100%);
        }

        .footer-table-panel {
            background-color: #1F2937;
            border-top: 1px solid #374151;
            display: flex;
            flex-direction: column;
            height: 260px;
            transition: all 0.3s ease;
        }

        .footer-collapsed {
            height: 40px !important;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- DROPZONE / UPLOAD VIEW -->
    <div id="upload-view" class="flex-1 flex flex-col items-center justify-center p-6">
        <div class="max-w-xl w-full bg-gray-800 border-4 border-dashed border-gray-600 rounded-2xl p-12 text-center cursor-pointer hover:border-indigo-500 transition-colors" id="drop-zone">
            <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <h3 class="text-xl font-semibold mb-2">Upload Category Excel File</h3>
            <p class="text-gray-400 text-sm mb-4">Drag and drop your spreadsheet here, or click to browse</p>
            <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls">
        </div>
    </div>

    <!-- MAIN APP VIEW (Hidden until file is loaded) -->
    <div id="app-view" class="hidden flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center">
            <h1 class="text-lg font-bold tracking-wide text-indigo-400">Data Deduplication Dashboard</h1>
            <div class="flex space-x-3">
                <button id="btn-save" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2 rounded shadow transition-colors">Save State</button>
                <button id="btn-download" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-4 py-2 rounded shadow transition-colors">Download Excel</button>
            </div>
        </header>

        <!-- Dynamic Content Splitting Frame -->
        <div class="flex-1 flex overflow-hidden relative">
            
            <!-- LEFT: Trees Main window -->
            <main class="flex-1 p-6 overflow-y-auto" id="trees-window">
                <div id="trees-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    <!-- Tree Visual Cards injected here dynamically -->
                </div>
            </main>

            <!-- RIGHT: Collapsing Ungrouped Sidebar Panel -->
            <aside id="ungrouped-panel" class="w-80 bg-gray-800 border-l border-gray-700 flex flex-col transition-all duration-300 transform translate-x-0 relative">
                <!-- Toggle Button Anchor -->
                <button id="toggle-ungrouped" class="absolute left-0 top-1/2 transform -translate-x-full -translate-y-1/2 bg-gray-800 border border-r-0 border-gray-700 p-2 rounded-l-md text-gray-400 hover:text-white">
                    ⏴
                </button>
                <div class="p-4 border-b border-gray-700">
                    <h2 class="font-bold text-gray-200">Ungrouped Attributes</h2>
                </div>
                <div id="ungrouped-list" class="flex-1 overflow-y-auto p-4 space-y-2">
                    <!-- List items injected here dynamically -->
                </div>
            </aside>
        </div>

        <!-- BOTTOM: Collapsing Table Window -->
        <footer id="table-panel" class="bg-gray-800 border-t border-gray-700 flex flex-col h-64 transition-all duration-300">
            <div class="px-6 py-2 bg-gray-850 border-b border-gray-700 flex justify-between items-center shrink-0">
                <div class="flex items-center space-x-4">
                    <button id="toggle-table" class="font-bold text-gray-400 hover:text-white text-sm">▼ Row Sheet Data</button>
                </div>
                <button id="btn-refresh" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-gray-200">Refresh Interface</button>
            </div>
            <div id="table-container" class="flex-1 overflow-auto p-4">
                <!-- Editable native Grid built here -->
                <table class="w-full text-left border-collapse text-xs text-gray-300" id="data-table">
                    <!-- Dynamic sheet elements go here -->
                </table>
            </div>
        </footer>
    </div>

    <!-- Interactive script runtime injection point -->
    <script>
        // Data states
        let globalData = [];      // Raw Excel rows parsing target
        let treeStructures = {};  // Root-Child relationships map
        let ungroupedList = [];   // Leftover attributes status list
    </script>
</body>
</html>
